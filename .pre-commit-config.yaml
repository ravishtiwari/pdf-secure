repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=2048']
  - repo: local
    hooks:
      - id: go-fmt
        name: go-fmt
        entry: bash -c "cd engine && go fmt ./..."
        language: system
        files: '\.go$'
        pass_filenames: false
      - id: go-vet
        name: go-vet
        entry: bash -c "cd engine && GO111MODULE=on go vet ./..."
        language: system
        files: '\.go$'
        pass_filenames: false
      - id: go-unit-tests
        name: go-unit-tests
        entry: bash -c "cd engine && GO111MODULE=on go test -short ./pkg/..."
        language: system
        files: '\.go$'
        pass_filenames: false
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: \.py$
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        files: \.py$
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest python/tests/ -v -k "not e2e"
        language: system
        files: \.py$
        pass_filenames: false
