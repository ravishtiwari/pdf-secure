name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24.0']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: engine/go.sum

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('engine/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download Go dependencies
        working-directory: ./engine
        run: go mod download

      - name: Run Go unit tests
        working-directory: ./engine
        run: go test -v -race -coverprofile=coverage.out ./pkg/...

      - name: Run Go E2E tests
        working-directory: ./engine
        run: go test -v -race ./cmd/...

      - name: Upload Go coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./engine/coverage.out
          flags: go
          name: go-coverage
        continue-on-error: true

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Run gofmt
        working-directory: ./engine
        run: |
          gofmt_output=$(gofmt -l .)
          if [ -n "$gofmt_output" ]; then
            echo "The following files are not formatted:"
            echo "$gofmt_output"
            exit 1
          fi

      - name: Run go vet
        working-directory: ./engine
        run: go vet ./...

      - name: Run staticcheck (optional)
        working-directory: ./engine
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
        continue-on-error: true

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: python/setup.py

      - name: Install Python dependencies
        working-directory: ./python
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Set up Go (for engine build)
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Build Go engine (for E2E tests)
        working-directory: ./engine
        run: |
          go build -o ../bin/securepdf-engine ./cmd/securepdf-engine

      - name: Run Python unit tests
        working-directory: ./python
        run: |
          pytest tests/test_sdk.py -v --cov=securepdf --cov-report=xml --cov-report=term

      - name: Run Python E2E tests
        working-directory: ./python
        run: |
          pytest tests/test_cli_e2e.py tests/test_batch_e2e.py tests/test_exceptions_e2e.py tests/test_provenance_e2e.py -v
        continue-on-error: false

      - name: Upload Python coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./python/coverage.xml
          flags: python
          name: python-coverage-${{ matrix.python-version }}
        continue-on-error: true

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Run ruff check
        working-directory: ./python
        run: ruff check securepdf/ tests/ --output-format=github

      - name: Run black check
        working-directory: ./python
        run: black --check securepdf/ tests/

  build-verification:
    name: Build Verification
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Build engine (Unix)
        if: runner.os != 'Windows'
        working-directory: ./engine
        run: |
          go build -v -o ../bin/securepdf-engine ./cmd/securepdf-engine
          file ../bin/securepdf-engine || true
          ../bin/securepdf-engine --help || true

      - name: Build engine (Windows)
        if: runner.os == 'Windows'
        working-directory: ./engine
        run: |
          go build -v -o ..\bin\securepdf-engine.exe .\cmd\securepdf-engine
          ..\bin\securepdf-engine.exe --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: securepdf-engine-${{ matrix.os }}
          path: bin/securepdf-engine*
          retention-days: 7

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [go-tests, python-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build engine
        working-directory: ./engine
        run: go build -o ../bin/securepdf-engine ./cmd/securepdf-engine

      - name: Install Python SDK
        working-directory: ./python
        run: pip install -e .

      - name: Run integration test
        run: |
          # Create test policy
          cat > policy.json <<EOF
          {
            "policy_version": "1.0",
            "encryption": {
              "enabled": true,
              "mode": "password",
              "user_password": "test123"
            }
          }
          EOF

          # Create dummy PDF (simple text file treated as PDF for testing)
          echo "%PDF-1.4" > test.pdf
          echo "dummy content" >> test.pdf

          # Test Go engine
          ./bin/securepdf-engine secure \
            --in test.pdf \
            --out secured.pdf \
            --policy policy.json \
            --receipt receipt.json || true

          # Check receipt exists
          if [ -f receipt.json ]; then
            echo "✅ Receipt generated"
            cat receipt.json | head -20
          else
            echo "❌ Receipt not generated"
            exit 1
          fi

          # Test Python SDK
          python3 -c "
          from securepdf import Policy, EncryptionConfig
          policy = Policy(encryption=EncryptionConfig(enabled=True, user_password='test'))
          print('✅ Python SDK imports successfully')
          "

  all-tests-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [go-tests, go-lint, python-tests, python-lint, build-verification, integration-test]
    if: success()

    steps:
      - name: Success
        run: |
          echo "✅ All CI checks passed!"
          echo "🎉 Ready to merge"
